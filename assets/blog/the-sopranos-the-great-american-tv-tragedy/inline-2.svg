<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Tony Soprano themed artwork</title>
  <desc id="desc">Dark editorial image with title text for Tony Soprano character analysis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151922"/>
      <stop offset="100%" stop-color="#303645"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="920" cy="200" r="180" fill="#861f29" opacity="0.24"/>
  <rect x="0" y="640" width="1200" height="24" fill="#8a232b"/>
  <text x="76" y="365" fill="#f0f2f7" font-size="78" font-family="Georgia, 'Times New Roman', serif">TONY SOPRANO</text>
  <text x="78" y="420" fill="#cad0da" font-size="34" font-family="Arial, Helvetica, sans-serif">Power, panic, and family</text>
