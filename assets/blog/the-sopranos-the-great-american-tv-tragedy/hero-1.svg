<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Sopranos hero artwork</title>
  <desc id="desc">Noir-styled title card inspired by The Sopranos set in New Jersey.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101217"/>
      <stop offset="100%" stop-color="#2a2f3a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.25" fill="#0b0d11">
    <rect x="80" y="0" width="72" height="900"/>
    <rect x="320" y="0" width="64" height="900"/>
    <rect x="560" y="0" width="76" height="900"/>
    <rect x="840" y="0" width="70" height="900"/>
    <rect x="1120" y="0" width="68" height="900"/>
    <rect x="1400" y="0" width="74" height="900"/>
  </g>
  <rect x="0" y="760" width="1600" height="28" fill="#7f2026"/>
  <text x="96" y="390" fill="#f2f3f5" font-size="92" font-family="Georgia, 'Times New Roman', serif" letter-spacing="2">THE SOPRANOS</text>
  <text x="98" y="450" fill="#c8ccd3" font-size="36" font-family="Arial, Helvetica, sans-serif">The Great American TV Tragedy</text>
  <text x="98" y="700" fill="#d9dde4" font-size="30" font-family="Arial, Helvetica, sans-serif">A New Jersey family crime drama</text>
</svg>
