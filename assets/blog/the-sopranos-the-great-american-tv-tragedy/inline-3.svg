<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">North Jersey mood artwork</title>
  <desc id="desc">Atmospheric skyline style card for Sopranos themes of loyalty and consequence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f131a"/>
      <stop offset="100%" stop-color="#222a36"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g fill="#0a0e14" opacity="0.85">
    <rect x="80" y="350" width="90" height="270"/>
    <rect x="210" y="300" width="120" height="320"/>
    <rect x="370" y="260" width="95" height="360"/>
    <rect x="520" y="320" width="130" height="300"/>
    <rect x="700" y="280" width="100" height="340"/>
    <rect x="850" y="240" width="140" height="380"/>
  </g>
  <rect x="0" y="650" width="1200" height="26" fill="#7f2128"/>
  <text x="72" y="150" fill="#f1f3f8" font-size="68" font-family="Georgia, 'Times New Roman', serif">NORTH JERSEY</text>
  <text x="74" y="204" fill="#cfd4de" font-size="32" font-family="Arial, Helvetica, sans-serif">Loyalty and consequence</text>
</svg>
